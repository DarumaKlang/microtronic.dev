<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="g3" x1="0" x2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <style>
      .bg{fill:#061226}
      .card{fill:url(#g3);opacity:0.08}
      .title{font-family:Inter, system-ui; font-weight:800; fill:#fff}
      .subtitle{font-family:Inter, system-ui; fill:#b3c0cf}
    </style>
  </defs>
  <rect class="bg" width="1200" height="800" rx="24"/>
  <g transform="translate(80,80)">
    <rect class="card" width="1040" height="640" rx="28"/>
    <g transform="translate(48,48)">
      <text class="title" x="0" y="120" font-size="56">Kafra Platform</text>
      <text class="subtitle" x="0" y="170" font-size="20">E-commerce Ready — Catalog, Checkout, Payments</text>

      <g transform="translate(0,220)">
