        <text x="20" y="78" fill="#94a3b8" font-size="15">• Product catalog</text>
        <text x="20" y="102" fill="#94a3b8" font-size="15">• Cart &amp; Checkout</text>
        <text x="20" y="126" fill="#94a3b8" font-size="15">• Payment gateway integrations</text>
      </g>

      <g transform="translate(420,220)">
